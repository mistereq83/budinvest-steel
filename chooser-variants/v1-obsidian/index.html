<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bud-Invest — Wybierz dział</title>
<meta name="description" content="Bud-Invest — konstrukcje stalowe oraz parki handlowe i osiedla mieszkaniowe. Wybierz interesujący Cię dział.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --black:#0a0a0a;
    --gold:#c9a84c;
    --gold-dim:rgba(201,168,76,.25);
    --gold-glow:rgba(201,168,76,.08);
    --white:#f5f5f5;
    --glass:rgba(255,255,255,.04);
    --glass-border:rgba(255,255,255,.08);
    --glass-hover:rgba(255,255,255,.07);
  }

  html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

  body{
    background:var(--black);
    color:var(--white);
    font-family:'Outfit',sans-serif;
    font-weight:300;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }

  /* Subtle noise overlay */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    opacity:.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
    pointer-events:none;
    z-index:9999;
  }

  /* Ambient gold glow — top center */
  body::after{
    content:'';
    position:fixed;
    top:-30vh;
    left:50%;
    transform:translateX(-50%);
    width:80vw;
    height:60vh;
    background:radial-gradient(ellipse,rgba(201,168,76,.06) 0%,transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  /* ── MAIN LAYOUT ── */
  .page{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:1;
    padding:3rem 1.5rem 1.5rem;
  }

  /* Header tagline */
  .tagline{
    text-align:center;
    margin-bottom:3.5rem;
    opacity:0;
  }
  .tagline h1{
    font-family:'Playfair Display',serif;
    font-weight:400;
    font-size:clamp(1.1rem,2.5vw,1.5rem);
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:.5rem;
  }
  .tagline p{
    font-size:.85rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:rgba(245,245,245,.35);
  }

  /* Panels wrapper */
  .chooser{
    display:flex;
    align-items:stretch;
    gap:0;
    width:100%;
    max-width:1100px;
    min-height:420px;
    position:relative;
  }

  /* Gold divider line */
  .divider{
    width:1px;
    background:linear-gradient(180deg,transparent 5%,var(--gold) 30%,var(--gold) 70%,transparent 95%);
    flex-shrink:0;
    opacity:0;
    position:relative;
    z-index:2;
  }
  .divider::before{
    content:'';
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:7px;height:7px;
    background:var(--gold);
    border-radius:50%;
    box-shadow:0 0 12px var(--gold-dim);
  }

  /* Panel */
  .panel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:3.5rem 2.5rem;
    text-decoration:none;
    color:var(--white);
    position:relative;
    background:var(--glass);
    border:1px solid var(--glass-border);
    transition:background .5s ease,border-color .5s ease,box-shadow .5s ease;
    cursor:pointer;
    opacity:0;
    overflow:hidden;
  }
  .panel:first-child{
    border-radius:12px 0 0 12px;
    border-right:none;
  }
  .panel:last-child{
    border-radius:0 12px 12px 0;
    border-left:none;
  }

  /* Hover shimmer line */
  .panel::before{
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:100%;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    transition:left .8s ease;
  }
  .panel:hover::before{left:100%}

  /* Corner accents */
  .panel::after{
    content:'';
    position:absolute;
    inset:12px;
    border:1px solid transparent;
    border-radius:4px;
    transition:border-color .5s ease;
    pointer-events:none;
  }
  .panel:hover::after{
    border-color:var(--gold-dim);
  }

  .panel:hover{
    background:var(--glass-hover);
    border-color:rgba(201,168,76,.15);
    box-shadow:0 0 60px rgba(201,168,76,.04);
  }

  /* Logo container */
  .panel-logo{
    height:60px;
    margin-bottom:2.5rem;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .panel-logo img{
    max-height:60px;
    max-width:260px;
    width:auto;
    object-fit:contain;
    filter:brightness(1);
    transition:filter .4s ease,transform .4s ease;
  }
  .panel:hover .panel-logo img{
    filter:brightness(1.15);
    transform:scale(1.03);
  }

  /* Subtitle */
  .panel-sub{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:400;
    font-size:1.05rem;
    color:rgba(245,245,245,.55);
    letter-spacing:.04em;
    margin-bottom:2rem;
    transition:color .4s ease;
  }
  .panel:hover .panel-sub{
    color:rgba(245,245,245,.8);
  }

  /* CTA arrow */
  .panel-cta{
    display:flex;
    align-items:center;
    gap:.6rem;
    font-size:.75rem;
    font-weight:500;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:.6;
    transition:opacity .4s ease,gap .4s ease;
  }
  .panel:hover .panel-cta{
    opacity:1;
    gap:1rem;
  }
  .panel-cta svg{
    width:18px;height:18px;
    transition:transform .4s ease;
  }
  .panel:hover .panel-cta svg{
    transform:translateX(4px);
  }

  /* ── FOOTER ── */
  footer{
    text-align:center;
    padding:2rem 1.5rem 1.8rem;
    position:relative;
    z-index:1;
    opacity:0;
  }
  .footer-line{
    width:40px;
    height:1px;
    background:var(--gold-dim);
    margin:0 auto 1rem;
  }
  footer p{
    font-size:.72rem;
    letter-spacing:.15em;
    color:rgba(245,245,245,.25);
    line-height:1.8;
  }
  footer a{
    color:rgba(245,245,245,.35);
    text-decoration:none;
    transition:color .3s ease;
  }
  footer a:hover{color:var(--gold)}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .page{padding:2.5rem 1rem 1rem}

    .chooser{
      flex-direction:column;
      min-height:auto;
      gap:0;
    }
    .panel:first-child{
      border-radius:12px 12px 0 0;
      border-right:1px solid var(--glass-border);
      border-bottom:none;
    }
    .panel:last-child{
      border-radius:0 0 12px 12px;
      border-left:1px solid var(--glass-border);
      border-top:none;
    }
    .panel{
      padding:2.8rem 2rem;
    }
    .divider{
      width:100%;
      height:1px;
      background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gold) 70%,transparent 95%);
    }
    .divider::before{
      width:7px;height:7px;
    }
    .panel-logo{height:48px;margin-bottom:1.8rem}
    .panel-logo img{max-height:48px;max-width:220px}
    .tagline{margin-bottom:2.5rem}
  }

  @media(max-width:400px){
    .panel{padding:2.2rem 1.5rem}
    .panel-logo img{max-height:40px;max-width:180px}
  }
</style>
</head>
<body>

<div class="page">

  <div class="tagline">
    <h1>Bud-Invest</h1>
    <p>Wybierz dział</p>
  </div>

  <div class="chooser">

    <a class="panel" href="https://budinvest-steel.com" id="panelSteel">
      <div class="panel-logo">
        <img src="https://budinvest-steel.com/wp-content/uploads/2021/04/logo_BI_STEEL_white.svg" alt="Budinvest Steel" loading="eager">
      </div>
      <span class="panel-sub">Konstrukcje stalowe</span>
      <span class="panel-cta">
        Przejdź
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
    </a>

    <div class="divider" id="divider"></div>

    <a class="panel" href="https://bud-invest.com/group/" id="panelGroup">
      <div class="panel-logo">
        <img src="https://bud-invest.com/wp-content/uploads/2024/09/BUD_INVEST_Group_@4x-invert.png" alt="Bud-Invest Group" loading="eager">
      </div>
      <span class="panel-sub">Parki handlowe &amp; osiedla</span>
      <span class="panel-cta">
        Przejdź
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
    </a>

  </div>

</div>

<footer>
  <div class="footer-line"></div>
  <p>
    ul. Dworcowa 12, 83-110 Tczew &nbsp;·&nbsp;
    <a href="tel:+48511641580">+48 511 641 580</a> &nbsp;·&nbsp;
    <a href="mailto:kontakt@bud-invest.com">kontakt@bud-invest.com</a>
  </p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const tl=gsap.timeline({defaults:{ease:'power3.out'}});

  tl.to('.tagline',{opacity:1,y:0,duration:1,delay:.3})
    .fromTo('#panelSteel',{opacity:0,x:-40},{opacity:1,x:0,duration:.9},'<+=.3')
    .fromTo('#divider',{opacity:0,scaleY:0},{opacity:1,scaleY:1,duration:.7,transformOrigin:'center center'},'<+=.2')
    .fromTo('#panelGroup',{opacity:0,x:40},{opacity:1,x:0,duration:.9},'<+=.1')
    .to('footer',{opacity:1,duration:.8},'<+=.3');

  // Subtle magnetic cursor effect on panels
  document.querySelectorAll('.panel').forEach(panel=>{
    panel.addEventListener('mousemove',e=>{
      const r=panel.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*8;
      const y=((e.clientY-r.top)/r.height-.5)*6;
      gsap.to(panel,{x:x,y:y,duration:.4,ease:'power2.out'});
    });
    panel.addEventListener('mouseleave',()=>{
      gsap.to(panel,{x:0,y:0,duration:.6,ease:'elastic.out(1,.4)'});
    });
  });
});
</script>

</body>
</html>
